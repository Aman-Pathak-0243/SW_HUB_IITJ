name: Secret Scan

# Milestone 0.5 — automated secret scanning.
# Runs gitleaks on every push and pull request to catch committed credentials.
# NOTE: this WILL flag the existing leaked values in README.md until they are
# rotated and purged from history (see docs/runbooks/git-history-purge.md).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan the whole history, not just the latest commit

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_CONFIG points at the repo config below.
          GITLEAKS_CONFIG: .gitleaks.toml
